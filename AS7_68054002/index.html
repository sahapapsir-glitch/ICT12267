<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS7_68054002 Sahapap siripon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Header -->
    <header class="navbar-header">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h2>Sahapap Srirpon</h2>
            </div>
            <nav class="navbar-menu">
                <ul class="nav-links">
                    <li><a href="#" class="nav-link">หน้าแรก</a></li>
                    <li><a href="#" class="nav-link">ข้อมูลบริษัท</a></li>
                    <li><a href="#" class="nav-link">บริการ</a></li>
                    <li><a href="#" class="nav-link">เกี่ยวกับเรา</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="content-container">
        <div class="video-banner">
            <video id="bgVideo" autoplay muted loop>
                <source src="Video.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        
        <div class="video-controls">
            <button class="btn-control" id="playPauseBtn" onclick="togglePlayPause()" title="เล่น/หยุดวิดีโอ">
                <i class="bi bi-pause-fill"></i>
                <span>Pause</span>
            </button>
            <button class="btn-control" id="muteBtn" onclick="toggleMute()" title="เปิด/ปิดเสียง">
                <i class="bi bi-volume-mute-fill"></i>
                <span>Mute</span>
            </button>
        </div>
        
        <div class="form-container">
            <div class="form-content">
                <h1 class="form-title">
                    แบบฟอร์มลงทะเบียน
                </h1>
                <p class="form-subtitle">กรุณากรอกข้อมูลเพื่อลงทะเบียน</p>
                
                <form id="mainForm">
                    <div class="form-group">
                        <label for="fullname" class="form-label">
                            ชื่อ-นามสกุล:
                        </label>
                        <input type="text" class="form-control" id="fullname" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email" class="form-label">
                            อีเมล:
                        </label>
                        <input type="email" class="form-control" id="email" placeholder="กรุณากรอกอีเมล" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">
                            รหัสผ่าน:
                        </label>
                        <input type="password" class="form-control" id="password" placeholder="กรุณากรอกรหัสผ่าน" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            เพศ:
                        </label>
                        <div class="gender-options">
                            <label class="radio-label">
                                <input type="radio" name="gender" value="male" required>
                                <span class="radio-custom"></span>
                                ชาย
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="gender" value="female" required>
                                <span class="radio-custom"></span>
                                หญิง
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="position" class="form-label">
                            ตำแหน่ง:
                        </label>
                        <select id="position" class="form-control" required>
                            <option value="">เลือกตำแหน่ง</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Mobile App">Mobile App</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-send"></i> ส่งข้อมูล
                        </button>
                        <button type="button" class="btn btn-outline-light btn-lg" onclick="resetForm()">
                            <i class="bi bi-arrow-clockwise"></i> รีเซ็ต
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="floating-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
